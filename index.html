<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Réussi - Lynx Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            padding: 50px 30px; 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
            animation: fadeIn 1s ease-out; 
        }
        .icon-check { 
            font-size: 70px; 
            margin-bottom: 20px; 
            text-shadow: 0 0 20px #00ff88; 
            animation: bounce 2s infinite; 
            display: inline-block;
        }
        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 20px; 
            background: -webkit-linear-gradient(#00ff88, #00b8ff); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        p { 
            font-size: 15px; 
            color: #cbd5e1; 
            margin-bottom: 30px; 
            line-height: 1.6; 
        }
        .btn-telegram { 
            display: inline-block; 
            background: linear-gradient(45deg, #0088cc, #005580); 
            color: white; 
            padding: 18px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3); 
            width: 100%;
        }
        .btn-telegram:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px rgba(0, 136, 204, 0.5); 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-15px); } 
            60% { transform: translateY(-7px); } 
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="icon-check">✅</div>
        <h1>Paiement Validé</h1>
        <p>Votre transaction Money Fusion a été traitée avec succès.<br><br><b>Étape finale :</b> Retournez sur Telegram et cliquez sur le bouton "✅ J'ai payé" pour recevoir votre logiciel.</p>
        
        <a href="https://t.me/LynxPro_555_bot" class="btn-telegram">🚀 Retourner sur Telegram</a>
    </div>
</body>
</html>
